name: CI

# ARCHITECTURE.md §10.2 — single workflow, push + pull_request, Node 22 pinned (R-7/R-8).
# Step order is load-bearing: `test` runs before `build` because the stdio E2E suite
# (test/e2e.stdio.test.ts) spawns src/index.ts via tsx, not dist/ — dist/ may not exist yet.
on:
  push:
  pull_request:

# Least-privilege default (workflow steps don't need to write anything back to the repo/PR).
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22']
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
